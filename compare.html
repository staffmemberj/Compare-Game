<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Compare & Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #e0f7fa;
            --main-teal: #00838F;
            --card-border: #dfe4ea;
            --card-shadow: #ced6e0;
            --bot-bg: #ffffff;
            --user-bg: #1e90ff;
            --bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            height: 100dvh;
            color: #2f3542;
            overflow: hidden;
            box-sizing: border-box;
        }

        * {
            box-sizing: inherit;
        }

        /* --- Layout --- */
        #app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        #board-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2vh 2vw;
            overflow-y: auto;
            position: relative;
        }

        #chat-area-container {
            width: 450px;
            max-width: 40vw;
            padding: 2vh 2vw 2vh 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            z-index: 100;
        }

        /* --- Smartphone Mockup for Desktop --- */
        #chat-app {
            width: 100%;
            height: 100%;
            background: #f8f9fa;
            border-radius: 40px;
            border: 10px solid #2f3542;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), inset 0 0 0 4px #dfe4ea;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 20px;
            background: #2f3542;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 20;
        }

        /* --- Chat UI --- */
        #chat-header {
            background: var(--main-teal);
            color: white;
            padding: 3.5vh 1.5vw 1.5vh 1.5vw;
            text-align: center;
            font-size: 2.2vh;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
            user-select: none;
        }

        #chat-window {
            flex: 1;
            padding: 2vh 1.5vw 6vh 1.5vw;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 85%;
            padding: 1.5vh 1.5vw;
            border-radius: 20px;
            font-size: 2vh;
            line-height: 1.5;
            animation: popIn 0.4s var(--bounce) forwards;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
            opacity: 0;
            transform: scale(0.8) translateY(10px);
            word-wrap: break-word;
        }

        .bot-bubble {
            background: var(--bot-bg);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 2px solid #dfe4ea;
        }

        .user-bubble {
            background: var(--user-bg);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            border: 2px solid #0984e3;
        }

        .sys-bubble {
            background: #f1f2f6;
            color: #747d8c;
            align-self: center;
            font-size: 1.6vh;
            border: 2px dashed #ced6e0;
            text-align: center;
            box-shadow: none;
        }

        /* --- Highlights for Adjectives --- */
        .highlight-adj {
            background-color: #ffeaa7;
            color: #d63031;
            padding: 0.2vh 0.8vw;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 2px solid #fdcb6e;
            transition: all 0.2s;
            display: inline-block;
            margin: 0 0.2vw;
        }
        
        .highlight-adj:hover {
            transform: scale(1.05);
            background-color: #fdcb6e;
        }

        .highlight-adj:active {
            transform: scale(0.95);
        }

        .user-bubble .highlight-adj {
            background-color: #f1c40f;
            color: #2f3542;
            border-bottom: 2px solid #f39c12;
        }

        .typing-indicator {
            display: flex;
            gap: 0.5vw;
            padding: 1.5vh;
            width: fit-content;
        }

        .dot {
            width: 1vh;
            height: 1vh;
            background: #a4b0be;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes popIn {
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        #interaction-area {
            background: #f1f2f6;
            border-top: 2px solid #dfe4ea;
            padding: 1.5vh 1vw 2vh 1vw;
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
            transition: transform 0.3s ease;
        }

        #interaction-area.hidden {
            display: none;
        }

        /* --- Sentence Builder --- */
        #input-row {
            background: #ffffff;
            border: 2px solid #ced6e0;
            border-radius: 20px;
            min-height: 6vh;
            display: flex;
            align-items: center;
            padding: 0.5vh;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        #sentence-builder {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5vh;
            min-height: 4vh;
            /* Extra bottom padding prevents active tile shadows from clipping */
            padding: 0.5vh 1vw 1vh 1vw; 
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 2vh;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
        }

        .clear-btn { color: #a4b0be; padding: 1vh; }
        .clear-btn:active { transform: scale(0.8); }

        .send-btn {
            background: #2ed573;
            color: white;
            border-radius: 50%;
            width: 4.5vh;
            height: 4.5vh;
            box-shadow: 0 3px 0 #218c53;
            margin-right: 0.5vw;
        }
        .send-btn:active { transform: translateY(3px); box-shadow: 0 0px 0 #218c53; }
        .send-btn svg { width: 2.2vh; height: 2.2vh; }

        #word-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1vh;
            max-height: 25vh;
            overflow-y: auto;
            /* Extra bottom padding prevents bottom row tile shadows from clipping */
            padding: 1vh 0.5vw 1.5vh 0.5vw; 
        }

        .word-tile {
            background: #ffffff;
            color: #2f3542;
            padding: 1vh 2vw;
            border-radius: 12px;
            font-size: 1.8vh;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 0 #ced6e0;
            border: 1px solid #dfe4ea;
            user-select: none;
            transition: all 0.1s;
        }
        .word-tile:active { transform: translateY(3px); box-shadow: 0 0px 0 #ced6e0; }

        .word-tile.in-builder {
            background: #1e90ff; color: white; box-shadow: 0 2px 0 #0984e3;
            border: 1px solid #0984e3; padding: 0.8vh 1.5vw; border-radius: 8px;
        }
        .word-tile.disabled-tile {
            background: #f1f2f6 !important; color: #a4b0be !important;
            border: 1px solid #dfe4ea !important; box-shadow: none !important;
            pointer-events: none;
        }

        /* --- Game Board & Cards --- */
        #game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3vh;
        }

        .round-badge {
            background: white;
            padding: 1vh 2vw;
            border-radius: 20px;
            font-size: 2vh;
            font-weight: 700;
            color: var(--main-teal);
            border: 3px solid var(--main-teal);
            box-shadow: 0 4px 0 var(--main-teal);
        }

        #cards-container {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 3vw;
            padding-bottom: 10vh;
        }

        .item-card {
            background-color: white;
            border: 4px solid var(--card-border);
            border-radius: 30px;
            box-shadow: 0 8px 0 var(--card-shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2vh 2vw;
            margin-bottom: 15px;
            width: clamp(150px, 20vw, 250px);
            transition: all 0.3s var(--bounce);
            animation: popIn 0.5s var(--bounce) forwards;
            opacity: 0;
            cursor: pointer;
        }

        .item-card:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 12px 0 var(--main-teal);
            border-color: var(--main-teal);
        }

        .item-card:active {
            transform: scale(0.95);
            box-shadow: 0 4px 0 var(--main-teal);
        }

        .card-emoji {
            font-size: 8vh;
            line-height: 1;
            margin-bottom: 1vh;
        }

        .card-name {
            font-size: 2.5vh;
            font-weight: bold;
            text-transform: capitalize;
            color: var(--main-teal);
            margin-bottom: 2vh;
            text-align: center;
        }

        .card-stats {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 1vh;
        }

        .stat-pill {
            background: #f1f2f6;
            color: #2f3542;
            padding: 1vh;
            border-radius: 12px;
            font-size: 1.6vh;
            font-weight: 600;
