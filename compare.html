<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Compare & Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #e0f7fa;
            --main-teal: #00838F;
            --card-border: #dfe4ea;
            --card-shadow: #ced6e0;
            --bot-bg: #ffffff;
            --user-bg: #1e90ff;
            --bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            height: 100dvh;
            color: #2f3542;
            overflow: hidden;
            box-sizing: border-box;
        }

        * {
            box-sizing: inherit;
        }

        /* --- Layout --- */
        #app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        #board-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2vh 2vw;
            overflow-y: auto;
            position: relative;
        }

        #chat-area-container {
            width: 450px;
            max-width: 40vw;
            padding: 2vh 2vw 2vh 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            z-index: 100;
        }

        /* --- Smartphone Mockup for Desktop --- */
        #chat-app {
            width: 100%;
            height: 100%;
            background: #f8f9fa;
            border-radius: 40px;
            border: 10px solid #2f3542;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), inset 0 0 0 4px #dfe4ea;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 20px;
            background: #2f3542;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 20;
        }

        /* --- Chat UI --- */
        #chat-header {
            background: var(--main-teal);
            color: white;
            padding: 3.5vh 1.5vw 1.5vh 1.5vw;
            text-align: center;
            font-size: 2.2vh;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
            user-select: none;
        }

        #chat-window {
            flex: 1;
            padding: 2vh 1.5vw 6vh 1.5vw;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 85%;
            padding: 1.5vh 1.5vw;
            border-radius: 20px;
            font-size: 2vh;
            line-height: 1.5;
            animation: popIn 0.4s var(--bounce) forwards;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
            opacity: 0;
            transform: scale(0.8) translateY(10px);
            word-wrap: break-word;
        }

        .bot-bubble {
            background: var(--bot-bg);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 2px solid #dfe4ea;
        }

        .user-bubble {
            background: var(--user-bg);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            border: 2px solid #0984e3;
        }

        .sys-bubble {
            background: #f1f2f6;
            color: #747d8c;
            align-self: center;
            font-size: 1.6vh;
            border: 2px dashed #ced6e0;
            text-align: center;
            box-shadow: none;
        }

        /* --- Highlights for Adjectives --- */
        .highlight-adj {
            background-color: #ffeaa7;
            color: #d63031;
            padding: 0.2vh 0.8vw;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 2px solid #fdcb6e;
            transition: all 0.2s;
            display: inline-block;
            margin: 0 0.2vw;
        }
        
        .highlight-adj:hover {
            transform: scale(1.05);
            background-color: #fdcb6e;
        }

        .highlight-adj:active {
            transform: scale(0.95);
        }

        .user-bubble .highlight-adj {
            background-color: #f1c40f;
            color: #2f3542;
            border-bottom: 2px solid #f39c12;
        }

        .typing-indicator {
            display: flex;
            gap: 0.5vw;
            padding: 1.5vh;
            width: fit-content;
        }

        .dot {
            width: 1vh;
            height: 1vh;
            background: #a4b0be;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes popIn {
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        #interaction-area {
            background: #f1f2f6;
            border-top: 2px solid #dfe4ea;
            padding: 1.5vh 1vw 2vh 1vw;
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
            transition: transform 0.3s ease;
        }

        #interaction-area.hidden {
            display: none;
        }

        /* --- Sentence Builder --- */
        #input-row {
            background: #ffffff;
            border: 2px solid #ced6e0;
            border-radius: 20px;
            min-height: 6vh;
            display: flex;
            align-items: center;
            padding: 0.5vh;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        #sentence-builder {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5vh;
            min-height: 4vh;
            padding: 0.5vh 1vw;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 2vh;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
        }

        .clear-btn { color: #a4b0be; padding: 1vh; }
        .clear-btn:active { transform: scale(0.8); }

        .send-btn {
            background: #2ed573;
            color: white;
            border-radius: 50%;
            width: 4.5vh;
            height: 4.5vh;
            box-shadow: 0 3px 0 #218c53;
            margin-right: 0.5vw;
        }
        .send-btn:active { transform: translateY(3px); box-shadow: 0 0px 0 #218c53; }
        .send-btn svg { width: 2.2vh; height: 2.2vh; }

        #word-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1vh;
            max-height: 25vh;
            overflow-y: auto;
        }

        .word-tile {
            background: #ffffff;
            color: #2f3542;
            padding: 1vh 2vw;
            border-radius: 12px;
            font-size: 1.8vh;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 0 #ced6e0;
            border: 1px solid #dfe4ea;
            user-select: none;
            transition: all 0.1s;
        }
        .word-tile:active { transform: translateY(3px); box-shadow: 0 0px 0 #ced6e0; }

        .word-tile.in-builder {
            background: #1e90ff; color: white; box-shadow: 0 2px 0 #0984e3;
            border: 1px solid #0984e3; padding: 0.8vh 1.5vw; border-radius: 8px;
        }
        .word-tile.disabled-tile {
            background: #f1f2f6 !important; color: #a4b0be !important;
            border: 1px solid #dfe4ea !important; box-shadow: none !important;
            pointer-events: none;
        }

        /* --- Game Board & Cards --- */
        #game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3vh;
        }

        .round-badge {
            background: white;
            padding: 1vh 2vw;
            border-radius: 20px;
            font-size: 2vh;
            font-weight: 700;
            color: var(--main-teal);
            border: 3px solid var(--main-teal);
            box-shadow: 0 4px 0 var(--main-teal);
        }

        #cards-container {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 3vw;
            padding-bottom: 10vh;
        }

        .item-card {
            background-color: white;
            border: 4px solid var(--card-border);
            border-radius: 30px;
            box-shadow: 0 8px 0 var(--card-shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2vh 2vw;
            margin-bottom: 15px;
            width: clamp(150px, 20vw, 250px);
            transition: all 0.3s var(--bounce);
            animation: popIn 0.5s var(--bounce) forwards;
            opacity: 0;
            cursor: pointer;
        }

        .item-card:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 12px 0 var(--main-teal);
            border-color: var(--main-teal);
        }

        .item-card:active {
            transform: scale(0.95);
            box-shadow: 0 4px 0 var(--main-teal);
        }

        .card-emoji {
            font-size: 8vh;
            line-height: 1;
            margin-bottom: 1vh;
        }

        .card-name {
            font-size: 2.5vh;
            font-weight: bold;
            text-transform: capitalize;
            color: var(--main-teal);
            margin-bottom: 2vh;
            text-align: center;
        }

        .card-stats {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 1vh;
        }

        .stat-pill {
            background: #f1f2f6;
            color: #2f3542;
            padding: 1vh;
            border-radius: 12px;
            font-size: 1.6vh;
            font-weight: 600;
            text-align: center;
            display: flex;
            flex-direction: column;
        }
        
        .stat-label {
            font-size: 1.2vh;
            color: #747d8c;
            text-transform: uppercase;
            margin-bottom: 0.2vh;
        }

        /* --- Modals & Screens --- */
        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }

        .title-text {
            color: var(--main-teal);
            font-size: 6vh;
            font-weight: 800;
            margin: 0 0 1vh 0;
            text-align: center;
        }

        .subtitle-text {
            color: #747d8c;
            font-size: 2.5vh;
            font-weight: 600;
            margin-bottom: 4vh;
            text-align: center;
            max-width: 80%;
        }

        .btn {
            background: #2ed573;
            color: white;
            border: 3px solid #218c53;
            padding: 1.5vh 3vw;
            border-radius: 20px;
            font-size: 2.5vh;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 0 #218c53;
            font-family: 'Fredoka', sans-serif;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #218c53;
        }

        .modal-backdrop {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(47, 53, 66, 0.8);
            z-index: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .zoomed-card {
            width: 80vw;
            max-width: 350px;
            padding: 4vh 4vw;
            animation: popInZoom 0.4s var(--bounce) forwards;
            cursor: default;
        }
        
        .zoomed-card:hover, .zoomed-card:active {
            transform: scale(1) translateY(0);
            box-shadow: 0 8px 0 var(--card-shadow);
            border-color: var(--card-border);
        }
        
        .zoomed-card .card-emoji { font-size: 15vh; margin-bottom: 2vh; }
        .zoomed-card .card-name { font-size: 4vh; margin-bottom: 3vh; }
        .zoomed-card .stat-pill { font-size: 2.2vh; padding: 1.5vh; margin-bottom: 1vh; }
        .zoomed-card .stat-label { font-size: 1.5vh; margin-bottom: 0.5vh; }

        /* Clickable elements in zoom view */
        .clickable-zoom-element {
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            border-radius: 15px;
            padding: 0.5vh 1vw;
            display: inline-block;
        }
        .clickable-zoom-element:hover {
            transform: scale(1.1);
            background-color: #f1f2f6;
        }
        .clickable-zoom-element:active {
            transform: scale(0.95);
            background-color: #dfe4ea;
        }

        /* --- Grammar Modal Specific --- */
        .grammar-card {
            background: white;
            border-radius: 25px;
            width: 85vw;
            max-width: 400px;
            padding: 0;
            overflow: hidden;
            animation: popInZoom 0.4s var(--bounce) forwards;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 4px solid var(--main-teal);
        }

        .grammar-header {
            background: var(--main-teal);
            color: white;
            padding: 2.5vh;
            text-align: center;
            font-size: 3.5vh;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .grammar-body {
            padding: 3vh 2vw;
            text-align: center;
        }

        .grammar-translation {
            font-size: 3vh;
            font-weight: 700;
            color: #d63031;
            margin-bottom: 2vh;
        }

        .grammar-rule-box {
            background: #f1f2f6;
            border-left: 5px solid #ffa502;
            padding: 2vh;
            border-radius: 8px;
            text-align: left;
            font-size: 2.2vh;
            color: #2f3542;
            line-height: 1.5;
        }

        .grammar-rule-title {
            font-weight: bold;
            color: #ffa502;
            margin-bottom: 1vh;
            font-size: 2.5vh;
        }

        @keyframes popInZoom {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- Mobile Layout Overrides --- */
        @media (max-width: 850px) {
            #chat-area-container {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                max-width: 100%;
                height: 85vh;
                padding: 0;
                background: transparent;
                transform: translateY(calc(100% - 8vh));
                transition: transform 0.4s var(--bounce);
                z-index: 150;
            }

            #chat-area-container.open {
                transform: translateY(0);
            }

            #chat-app {
                border-radius: 25px 25px 0 0;
                border: none;
                box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            }

            .phone-notch {
                display: none;
            }

            #chat-header {
                height: 8vh;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                position: relative;
                cursor: pointer;
            }

            .close-chat-btn {
                display: flex !important;
                align-items: center;
                justify-content: center;
                position: absolute;
                right: 4vw;
                background: rgba(255,255,255,0.2);
                border: none;
                color: white;
                font-weight: bold;
                width: 4vh;
                height: 4vh;
                border-radius: 10px;
                font-family: inherit;
                pointer-events: none;
                font-size: 2vh;
            }

            #cards-container {
                gap: 4vw;
                padding-bottom: 18vh;
            }

            .item-card {
                width: 42%;
                padding: 1.5vh 2vw;
            }

            /* Maintain card proportions on Mobile Zoomed View */
            .zoomed-card {
                width: 65vw; /* Much closer to the portrait card shape */
                padding: 2.5vh 3vw;
                border-radius: 20px;
            }
            .zoomed-card .card-emoji { font-size: 10vh; margin-bottom: 1vh; }
            .zoomed-card .card-name { font-size: 3.5vh; margin-bottom: 2vh; }
            .zoomed-card .stat-pill { font-size: 1.8vh; padding: 1.2vh; margin-bottom: 0.8vh; }
            .zoomed-card .stat-label { font-size: 1.2vh; margin-bottom: 0.2vh; }
        }

        .close-chat-btn { display: none; }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="start-screen" class="overlay-screen">
        <h1 class="title-text">Compare & Chat</h1>
        <p class="subtitle-text">Look at the data cards, read the teacher's question, and build the correct sentence!</p>
        <button class="btn" onclick="startGame()">Start Game 🚀</button>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="overlay-screen" style="display: none; opacity: 0;">
        <h1 class="title-text" style="color: #2ed573;">Great Job! 🎉</h1>
        <p class="subtitle-text">You completed all 5 rounds successfully!</p>
        <button class="btn" style="background: #1e90ff; border-color: #0984e3; box-shadow: 0 6px 0 #0984e3;" onclick="resetGame()">Play Again 🔄</button>
    </div>

    <!-- Card Zoom Modal -->
    <div id="card-zoom-modal" class="modal-backdrop" style="display: none;" onclick="closeCardZoom()">
        <div id="zoomed-card-content" class="item-card zoomed-card" onclick="event.stopPropagation()">
            <!-- Injected via JS -->
        </div>
    </div>

    <!-- Grammar Modal -->
    <div id="grammar-modal" class="modal-backdrop" style="display: none; z-index: 700;" onclick="closeGrammarModal()">
        <div class="grammar-card" onclick="event.stopPropagation()">
            <div class="grammar-header" id="grammar-word-title">Word</div>
            <div class="grammar-body">
                <div class="grammar-translation" id="grammar-translation-text">日本語訳</div>
                <div class="grammar-rule-box">
                    <div class="grammar-rule-title" id="grammar-rule-title">Rule</div>
                    <div id="grammar-rule-desc">Rule description</div>
                </div>
            </div>
        </div>
    </div>

    <div id="app-container">
        <!-- Left Side: Cards Board -->
        <div id="board-area">
            <div id="game-header">
                <div class="round-badge" id="round-display">Round 1 / 5</div>
            </div>
            <div id="cards-container">
                <!-- Cards injected via JS -->
            </div>
        </div>

        <!-- Right Side: Chat Interface -->
        <div id="chat-area-container">
            <div id="chat-app">
                <div class="phone-notch"></div>
                <div id="chat-header" onclick="toggleMobileChat()">
                    <span>Teacher Bot 🤖</span>
                    <button class="close-chat-btn">▲</button>
                </div>
                
                <div id="chat-window">
                    <!-- Chat bubbles injected via JS -->
                </div>

                <div id="interaction-area" class="hidden">
                    <div id="input-row">
                        <div id="sentence-builder"></div>
                        <button class="icon-btn clear-btn" onclick="clearSentence()">✖</button>
                        <button class="icon-btn send-btn" onclick="checkAnswer()">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <div id="word-bank"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* --- Game & Grammar Data --- */
        const gameData = {
            animals: {
                name: "Animals",
                items: [
                    { name: "elephant", emoji: "🐘", stats: { weight: [3000, 6000], speed: [20, 40] } },
                    { name: "mouse", emoji: "🐁", stats: { weight: [1, 5], speed: [10, 15] } },
                    { name: "cheetah", emoji: "🐆", stats: { weight: [30, 60], speed: [80, 120] } },
                    { name: "turtle", emoji: "🐢", stats: { weight: [10, 150], speed: [1, 5] } },
                    { name: "lion", emoji: "🦁", stats: { weight: [150, 250], speed: [50, 80] } },
                    { name: "horse", emoji: "🐎", stats: { weight: [300, 800], speed: [40, 70] } },
                    { name: "rabbit", emoji: "🐇", stats: { weight: [2, 10], speed: [30, 50] } }
                ],
                statConfig: {
                    weight: { label: "Weight (kg)", high: "heavier", low: "lighter", highest: "the heaviest", lowest: "the lightest" },
                    speed: { label: "Speed (km/h)", high: "faster", low: "slower", highest: "the fastest", lowest: "the slowest" }
                }
            },
            vehicles: {
                name: "Vehicles",
                items: [
                    { name: "bicycle", emoji: "🚲", stats: { price: [100, 500], speed: [15, 30] } },
                    { name: "car", emoji: "🚗", stats: { price: [10000, 50000], speed: [100, 200] } },
                    { name: "airplane", emoji: "✈️", stats: { price: [100000, 500000], speed: [500, 900] } },
                    { name: "train", emoji: "🚆", stats: { price: [50000, 90000], speed: [150, 300] } },
                    { name: "scooter", emoji: "🛴", stats: { price: [50, 200], speed: [10, 25] } },
                    { name: "bus", emoji: "🚌", stats: { price: [20000, 80000], speed: [80, 120] } }
                ],
                statConfig: {
                    price: { label: "Price ($)", high: "more expensive", low: "cheaper", highest: "the most expensive", lowest: "the cheapest" },
                    speed: { label: "Speed (km/h)", high: "faster", low: "slower", highest: "the fastest", lowest: "the slowest" }
                }
            },
            foods: {
                name: "Foods",
                items: [
                    { name: "apple", emoji: "🍎", stats: { price: [1, 3], weight: [100, 200] } },
                    { name: "pizza", emoji: "🍕", stats: { price: [10, 25], weight: [400, 800] } },
                    { name: "cake", emoji: "🎂", stats: { price: [15, 40], weight: [500, 1500] } },
                    { name: "candy", emoji: "🍬", stats: { price: [1, 2], weight: [10, 50] } },
                    { name: "burger", emoji: "🍔", stats: { price: [5, 15], weight: [200, 400] } },
                    { name: "watermelon", emoji: "🍉", stats: { price: [4, 10], weight: [2000, 5000] } }
                ],
                statConfig: {
                    price: { label: "Price ($)", high: "more expensive", low: "cheaper", highest: "the most expensive", lowest: "the cheapest" },
                    weight: { label: "Weight (g)", high: "heavier", low: "lighter", highest: "the heaviest", lowest: "the lightest" }
                }
            }
        };

        const grammarDictionary = {
            "heavier": { ja: "より重い (heavy)", type: "er" },
            "lighter": { ja: "より軽い (light)", type: "er" },
            "the heaviest": { ja: "一番重い (heavy)", type: "est" },
            "the lightest": { ja: "一番軽い (light)", type: "est" },
            "faster": { ja: "より速い (fast)", type: "er" },
            "slower": { ja: "より遅い (slow)", type: "er" },
            "the fastest": { ja: "一番速い (fast)", type: "est" },
            "the slowest": { ja: "一番遅い (slow)", type: "est" },
            "more expensive": { ja: "より値段が高い (expensive)", type: "more" },
            "cheaper": { ja: "より安い (cheap)", type: "er" },
            "the most expensive": { ja: "一番値段が高い (expensive)", type: "most" },
            "the cheapest": { ja: "一番安い (cheap)", type: "est" }
        };

        const ruleDescriptions = {
            "er": {
                title: "-er の使い方",
                desc: "短い単語の最後に <b>-er</b> をつけて、「より〜」という意味にします。<br><br><small>例: fast → fast<b>er</b></small>"
            },
            "est": {
                title: "-est の使い方",
                desc: "短い単語の最後に <b>-est</b> をつけて、「一番〜」という意味にします。言葉の前に <b>the</b> が必要です。<br><br><small>例: fast → <b>the</b> fast<b>est</b></small>"
            },
            "more": {
                title: "more の使い方",
                desc: "長い単語の前に <b>more</b> をおいて、「より〜」という意味にします。<br><br><small>例: expensive → <b>more</b> expensive</small>"
            },
            "most": {
                title: "most の使い方",
                desc: "長い単語の前に <b>most</b> をおいて、「一番〜」という意味にします。言葉の前に <b>the</b> が必要です。<br><br><small>例: expensive → <b>the most</b> expensive</small>"
            }
        };

        /* --- State Variables --- */
        let currentRound = 1;
        const maxRounds = 5;
        let currentValidAnswers = [];
        let isChatTyping = false;

        /* --- Utility Functions --- */
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function playSound(type) {
            // Mocked audio for iframe safety
        }

        /* --- Chat Text Formatting (Highlights Adjectives) --- */
        function formatChatText(text) {
            const keys = Object.keys(grammarDictionary).sort((a, b) => b.length - a.length);
            let tempText = text;
            let replacements = [];

            keys.forEach((key) => {
                const regex = new RegExp(`\\b${key}\\b`, 'gi');
                tempText = tempText.replace(regex, (match) => {
                    replacements.push({ match: match, key: key });
                    return `__PLACEHOLDER_${replacements.length - 1}__`;
                });
            });

            replacements.forEach((rep, index) => {
                const htmlTag = `<span class="highlight-adj" onclick="openGrammarModal('${rep.key}', event)">${rep.match}</span>`;
                tempText = tempText.replace(`__PLACEHOLDER_${index}__`, htmlTag);
            });

            return tempText;
        }

        /* --- Grammar Modal Logic --- */
        function openGrammarModal(key, event) {
            if(event) event.stopPropagation(); 
            playSound('tap');
            
            const data = grammarDictionary[key.toLowerCase()];
            if(!data) return;

            const ruleData = ruleDescriptions[data.type];

            document.getElementById('grammar-word-title').innerText = capitalize(key);
            document.getElementById('grammar-translation-text').innerText = data.ja;
            document.getElementById('grammar-rule-title').innerHTML = ruleData.title;
            document.getElementById('grammar-rule-desc').innerHTML = ruleData.desc;

            const modal = document.getElementById('grammar-modal');
            modal.style.display = 'flex';
            void modal.offsetWidth;
            modal.style.opacity = '1';
        }

        function closeGrammarModal() {
            playSound('tap');
            const modal = document.getElementById('grammar-modal');
            modal.style.opacity = '0';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }

        /* --- UI Controls --- */
        function setMobileChatState(isOpen) {
            if (window.innerWidth > 850) return;
            const chatContainer = document.getElementById('chat-area-container');
            const btn = document.querySelector('.close-chat-btn');
            
            if (isOpen) {
                chatContainer.classList.add('open');
                btn.innerText = '▼';
            } else {
                chatContainer.classList.remove('open');
                btn.innerText = '▲';
            }
        }

        function toggleMobileChat() {
            if (window.innerWidth > 850) return;
            playSound('tap');
            const chatContainer = document.getElementById('chat-area-container');
            setMobileChatState(!chatContainer.classList.contains('open'));
        }

        function scrollToBottom() {
            const chat = document.getElementById('chat-window');
            setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
        }

        function hideInteraction() {
            const area = document.getElementById('interaction-area');
            area.classList.add('hidden');
        }

        function showInteraction() {
            const area = document.getElementById('interaction-area');
            area.classList.remove('hidden');
            scrollToBottom();
        }

        /* --- Chat Bubbles --- */
        function addBubble(text, className) {
            const chat = document.getElementById('chat-window');
            const bubble = document.createElement('div');
            bubble.className = `bubble ${className}`;
            bubble.innerHTML = formatChatText(text);
            chat.appendChild(bubble);
            scrollToBottom();
        }

        function showTypingIndicator(callback, duration = 1200) {
            isChatTyping = true;
            const chat = document.getElementById('chat-window');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'bubble bot-bubble typing-indicator';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            
            chat.appendChild(typingDiv);
            scrollToBottom();

            setTimeout(() => {
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();
                isChatTyping = false;
                callback();
            }, duration);
        }

        /* --- Game Logic --- */
        function startGame() {
            playSound('tap');
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                resetGameData();
                startRound();
            }, 300);
        }

        function resetGameData() {
            currentRound = 1;
            document.getElementById('chat-window').innerHTML = '';
            document.getElementById('round-display').innerText = `Round ${currentRound} / ${maxRounds}`;
        }

        function resetGame() {
            playSound('tap');
            document.getElementById('end-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('end-screen').style.display = 'none';
                resetGameData();
                startRound();
            }, 300);
        }

        function startRound() {
            document.getElementById('round-display').innerText = `Round ${currentRound} / ${maxRounds}`;
            hideInteraction();
            
            const categoryKeys = Object.keys(gameData);
            const catKey = categoryKeys[Math.floor(Math.random() * categoryKeys.length)];
            const category = gameData[catKey];
            
            const numItems = Math.floor(Math.random() * 3) + 2; 
            let selectedItems = shuffleArray([...category.items]).slice(0, numItems);

            const statKeys = Object.keys(category.statConfig);
            const targetStat = statKeys[Math.floor(Math.random() * statKeys.length)];
            
            let usedValues = new Set();
            selectedItems.forEach(item => {
                item.currentStats = {};
                statKeys.forEach(stat => {
                    let val;
                    if (stat === targetStat) {
                        do {
                            val = randomInt(item.stats[stat][0], item.stats[stat][1]);
                        } while (usedValues.has(val));
                        usedValues.add(val);
                    } else {
                        val = randomInt(item.stats[stat][0], item.stats[stat][1]);
                    }
                    item.currentStats[stat] = val;
                });
            });

            renderCards(selectedItems, category.statConfig);

            selectedItems.sort((a, b) => a.currentStats[targetStat] - b.currentStats[targetStat]);
            const isHigh = Math.random() > 0.5;
            
            let winner, loser, question, baseSentence;
            const adjConfig = category.statConfig[targetStat];

            if (numItems === 2) {
                winner = isHigh ? selectedItems[1] : selectedItems[0];
                loser = isHigh ? selectedItems[0] : selectedItems[1];
                let adj = isHigh ? adjConfig.high : adjConfig.low;
                
                question = `Look at the cards! Which is ${adj}?`;
                baseSentence = `The ${winner.name} is ${adj} than the ${loser.name}.`;
            } else {
                winner = isHigh ? selectedItems[numItems - 1] : selectedItems[0];
                let adj = isHigh ? adjConfig.highest : adjConfig.lowest;
                
                question = `Look at all the cards! Which is ${adj}?`;
                baseSentence = `The ${winner.name} is ${adj}.`;
            }

            currentValidAnswers = [baseSentence];

            let correctWords = baseSentence.split(" ");
            let distractors = [];
            
            if (numItems === 2) {
                distractors.push(loser.name);
                distractors.push(isHigh ? adjConfig.low : adjConfig.high);
                distractors.push(isHigh ? adjConfig.highest : adjConfig.lowest);
                if (adjConfig.high.includes("more")) distractors.push("most");
            } else {
                distractors.push(selectedItems[1].name);
                distractors.push(isHigh ? adjConfig.lowest : adjConfig.highest);
                distractors.push(isHigh ? adjConfig.high : adjConfig.low);
                distractors.push("than");
            }

            distractors = distractors.filter(d => !correctWords.includes(d));
            let fullBank = [...correctWords, ...distractors.slice(0, 4)];
            fullBank = shuffleArray(fullBank);

            showTypingIndicator(() => {
                if (currentRound === 1) {
                    const introMsg = window.innerWidth > 850 ? "Let's begin! Check the data on the left." : "Let's begin! Check the data above.";
                    addBubble(introMsg, "sys-bubble");
                }
                addBubble(question, "bot-bubble");
                
                setTimeout(() => { setMobileChatState(true); }, 500);
                setTimeout(() => {
                    renderWordBank(fullBank);
                    showInteraction();
                }, 400);
            }, 1000);
        }

        function renderCards(items, statConfig) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.style.animationDelay = `${index * 0.1}s`;

                card.onclick = () => openCardZoom(item, statConfig);

                let statsHtml = '';
                for (let stat in statConfig) {
                    let formattedVal = Number(item.currentStats[stat]).toLocaleString('en-US');
                    if (statConfig[stat].label.includes("$")) formattedVal = "$" + formattedVal;
                    
                    statsHtml += `
                        <div class="stat-pill">
                            <span class="stat-label">${statConfig[stat].label}</span>
                            <span>${formattedVal}</span>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="card-emoji">${item.emoji}</div>
                    <div class="card-name">${item.name}</div>
                    <div class="card-stats">${statsHtml}</div>
                `;
                container.appendChild(card);
            });
        }

        /* --- Auto Insert Logic --- */
        function autoInsertCardWords(itemName) {
            const interactionArea = document.getElementById('interaction-area');
            if (interactionArea.classList.contains('hidden')) return;

            const builder = document.getElementById('sentence-builder');
            const bank = document.getElementById('word-bank');

            const nameTile = Array.from(bank.children).find(t => {
                let cleanText = t.innerText.replace(/[.,!?]/g, '');
                return cleanText.toLowerCase() === itemName.toLowerCase();
            });

            if (nameTile) {
                const isFirstWord = builder.children.length === 0;

                if (isFirstWord) {
                    const uppercaseThe = Array.from(bank.children).find(t => t.innerText === "The");
                    if (uppercaseThe) moveToSentence(uppercaseThe);
                } else {
                    const lastWord = builder.lastElementChild ? builder.lastElementChild.innerText : "";
                    if (lastWord.toLowerCase() !== "the") {
                        const lowercaseThe = Array.from(bank.children).find(t => t.innerText === "the");
                        if (lowercaseThe) moveToSentence(lowercaseThe);
                    }
                }
                moveToSentence(nameTile);
            }
        }

        function insertAndCloseZoom(itemName) {
            playSound('tap');
            autoInsertCardWords(itemName);
            closeCardZoom();
            
            // Pop open chat on mobile to show the sentence change
            if (window.innerWidth <= 850) {
                setTimeout(() => {
                    setMobileChatState(true);
                }, 350); 
            }
        }

        /* --- Zoom Modal Logic --- */
        function openCardZoom(item, statConfig) {
            playSound('tap');
            
            const modal = document.getElementById('card-zoom-modal');
            const content = document.getElementById('zoomed-card-content');
            
            let statsHtml = '';
            for (let stat in statConfig) {
                let formattedVal = Number(item.currentStats[stat]).toLocaleString('en-US');
                if (statConfig[stat].label.includes("$")) formattedVal = "$" + formattedVal;
                
                statsHtml += `
                    <div class="stat-pill">
                        <span class="stat-label">${statConfig[stat].label}</span>
                        <span>${formattedVal}</span>
                    </div>
                `;
            }

            // Using onclick with insertAndCloseZoom inside the innerHTML strings
            content.innerHTML = `
                <div class="card-emoji clickable-zoom-element" onclick="insertAndCloseZoom('${item.name}')">${item.emoji}</div>
                <div class="card-name clickable-zoom-element" onclick="insertAndCloseZoom('${item.name}')">${item.name}</div>
                <div class="card-stats">${statsHtml}</div>
            `;
            
            modal.style.display = 'flex';
            void modal.offsetWidth;
            modal.style.opacity = '1';
        }

        function closeCardZoom() {
            playSound('tap');
            const modal = document.getElementById('card-zoom-modal');
            modal.style.opacity = '0';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        /* --- Sentence Builder Logic --- */
        function renderWordBank(words) {
            const bank = document.getElementById('word-bank');
            bank.innerHTML = '';
            clearSentence(true);
            
            words.forEach(word => {
                let tile = document.createElement('div');
                tile.className = 'word-tile';
                tile.innerText = word;
                tile.onclick = () => moveToSentence(tile);
                bank.appendChild(tile);
            });
        }

        function moveToSentence(tile) {
            if (tile.classList.contains('disabled-tile')) return;
            playSound('tap');
            const builder = document.getElementById('sentence-builder');
            tile.onclick = () => moveToBank(tile);
            tile.classList.add('in-builder');
            builder.appendChild(tile);
            scrollToBottom();
        }

        function moveToBank(tile) {
            if (tile.classList.contains('disabled-tile')) return;
            playSound('tap');
            const bank = document.getElementById('word-bank');
            tile.onclick = () => moveToSentence(tile);
            tile.classList.remove('in-builder');
            bank.appendChild(tile);
            scrollToBottom();
        }

        function clearSentence(silent = false) {
            if (!silent) playSound('tap');
            const builder = document.getElementById('sentence-builder');
            const bank = document.getElementById('word-bank');
            while (builder.firstChild) {
                const tile = builder.firstChild;
                tile.onclick = () => moveToSentence(tile);
                tile.classList.remove('in-builder');
                bank.appendChild(tile);
            }
        }

        document.addEventListener('keydown', function(event) {
            if (document.getElementById('interaction-area').classList.contains('hidden')) return;

            if (event.key === 'Enter') {
                event.preventDefault();
                checkAnswer();
            } else if (event.key === 'Backspace') {
                event.preventDefault();
                const builder = document.getElementById('sentence-builder');
                if (builder.lastChild) {
                    moveToBank(builder.lastChild);
                }
            }
        });

        function checkAnswer() {
            const builder = document.getElementById('sentence-builder');
            const tiles = builder.querySelectorAll('.word-tile');
            if (tiles.length === 0) return;

            playSound('send');
            let userSentence = Array.from(tiles).map(t => t.innerText).join(" ");
            addBubble(userSentence, "user-bubble");
            hideInteraction();

            const isCorrect = currentValidAnswers.includes(userSentence);

            if (isCorrect) {
                showTypingIndicator(() => {
                    addBubble("Excellent! Spot on. 🌟", "bot-bubble");
                    
                    setTimeout(() => {
                        currentRound++;
                        if (currentRound > maxRounds) {
                            showEndScreen();
                        } else {
                            startRound();
                        }
                    }, 2000);
                }, 800);
            } else {
                showTypingIndicator(() => {
                    let hint = "Not quite.";
                    if (!userSentence.startsWith("The")) {
                        hint += " Remember to start with 'The'.";
                    } else if (userSentence.includes("than") && !userSentence.match(/er\b|more\b/)) {
                        hint += " If you use 'than', you need a comparative word!";
                    }

                    addBubble(`${hint} Let's try again!`, "bot-bubble");
                    
                    setTimeout(() => {
                        processIncorrectTiles(tiles);
                        showInteraction();
                    }, 500);
                }, 800);
            }
        }

        function processIncorrectTiles(tiles) {
            const validAnswer = currentValidAnswers[0];
            let builtString = "";
            let maxMatch = 0;

            for (let i = 0; i < tiles.length; i++) {
                builtString += (i > 0 ? " " : "") + tiles[i].innerText;
                if (validAnswer === builtString || validAnswer.startsWith(builtString + " ")) {
                    maxMatch = i + 1;
                } else {
                    break;
                }
            }

            for (let i = 0; i < tiles.length; i++) {
                let t = tiles[i];
                if (i >= maxMatch) {
                    const bank = document.getElementById('word-bank');
                    t.onclick = () => moveToSentence(t);
                    t.classList.remove('in-builder');
                    bank.appendChild(t);
                }
            }
        }

        function showEndScreen() {
            setMobileChatState(false);
            
            const endScreen = document.getElementById('end-screen');
            endScreen.style.display = 'flex';
            setTimeout(() => {
                endScreen.style.opacity = '1';
                playSound('tada');
            }, 50);
        }

    </script>
